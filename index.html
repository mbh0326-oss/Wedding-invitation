<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="민준과 서연의 모바일 청첩장 시안입니다."
    />
    <meta property="og:title" content="민준 & 서연 결혼합니다" />
    <meta
      property="og:description"
      content="소중한 분들을 결혼식에 초대합니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/cover.png" />
    <title>민준 & 서연 모바일 청첩장 시안</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="draft-nav">
      <p>Wedding Invitation Drafts</p>
      <nav aria-label="청첩장 시안 선택" data-draft-nav></nav>
    </header>

    <main class="showcase" aria-label="모바일 청첩장 시안" data-showcase></main>

    <noscript>
      <p class="noscript">브라우저에서 JavaScript를 켜면 시안을 볼 수 있습니다.</p>
    </noscript>

    <div class="lightbox" data-lightbox-view hidden>
      <button type="button" class="lightbox__close" data-lightbox-close>
        닫기
      </button>
      <img src="" alt="갤러리 확대 이미지" data-lightbox-image />
    </div>

    <div class="toast" aria-live="polite" role="status" data-feedback></div>

    <script src="script.js"></script>
  </body>
</html>
